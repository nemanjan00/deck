name: AppImage

# Every push to main refreshes the rolling "continuous" prerelease with
# ready-to-run AppImages (x86_64 + aarch64) — wget one on the Pi and go.
# Tags attach the same AppImages to the versioned release.
#
# Built on ubuntu-22.04 (glibc 2.35) so they run on Raspberry Pi OS
# bookworm and anything newer. GL/GLES, libxkbcommon and an audio server
# come from the host system (standard on Pi OS desktop).

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  appimage:
    strategy:
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: x86_64
          - runner: ubuntu-22.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: appimage-${{ matrix.arch }}

      - name: Build release binary
        run: cargo build --release

      - name: Assemble AppDir
        run: |
          mkdir -p AppDir/usr/bin
          cp target/release/deck AppDir/usr/bin/deck
          ./target/release/deck shot --icon AppDir/deck.png
          cat > AppDir/deck.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=deck
          Comment=Handheld ham-radio RX machine for SDR cyberdecks
          Exec=deck
          Icon=deck
          Categories=HamRadio;Audio;Network;
          Terminal=false
          EOF
          ln -s usr/bin/deck AppDir/AppRun
          cp AppDir/deck.png AppDir/.DirIcon

      - name: Build AppImage
        run: |
          curl -fsSL -o appimagetool \
            "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${{ matrix.arch }}.AppImage"
          chmod +x appimagetool
          ARCH=${{ matrix.arch }} ./appimagetool --appimage-extract-and-run \
            AppDir "deck-${{ matrix.arch }}.AppImage"
          ./deck-${{ matrix.arch }}.AppImage --appimage-extract-and-run --version

      - uses: actions/upload-artifact@v4
        with:
          name: deck-${{ matrix.arch }}.AppImage
          path: deck-${{ matrix.arch }}.AppImage

      - name: Update rolling "continuous" prerelease (main)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view continuous >/dev/null 2>&1 || \
            gh release create continuous --prerelease \
              --title "continuous (latest main)" \
              --notes "Rolling build of main. Grab the AppImage for your arch, chmod +x, run. Needs: GL/GLES, libxkbcommon, pulse/pipewire (Pi OS desktop has all three)."
          gh release upload continuous "deck-${{ matrix.arch }}.AppImage" --clobber

      - name: Attach to tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes
          gh release upload "${GITHUB_REF_NAME}" "deck-${{ matrix.arch }}.AppImage" --clobber
