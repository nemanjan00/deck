name: AppImage

# Self-contained AppImages (x86_64 + aarch64) that BUNDLE the SDR decode
# tools — rtl_sdr, multimon-ng, sox, minimodem, hackrf, airspyhf (apt) plus
# dsd-neo, rtl_ais, dump1090 (built from source). One download, every mode.
#
# Every push to main refreshes the rolling "continuous" prerelease; tags
# attach the same AppImages to the versioned release. Built on ubuntu-22.04
# (glibc 2.35) so they run on Raspberry Pi OS bookworm and newer. GL/GLES,
# libxkbcommon and the audio daemon come from the host (Pi OS desktop has
# them); RTL-SDR USB permissions are a host setup step (packaging/*.rules).
#
# The build logic lives in ci/build-appimage.sh so it can be run locally on
# the Pi too, and iterated without editing YAML.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  appimage:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: x86_64
          - runner: ubuntu-22.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: appimage-${{ matrix.arch }}

      - name: Build deck (release)
        run: cargo build --release

      # Publish the bare binary to `continuous` right away, so there is always
      # something downloadable even if the (heavier) AppImage build below
      # fails. Bare binary needs the decode tools apt-installed on the host.
      - name: Publish bare binary to continuous (main)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp target/release/deck "deck-${{ matrix.arch }}"
          gh release view continuous >/dev/null 2>&1 || \
            gh release create continuous --prerelease \
              --title "continuous (latest main)" \
              --notes "Rolling build of main." || true
          gh release upload continuous "deck-${{ matrix.arch }}" --clobber

      - name: Build AppImage (bundles decode tools)
        run: ci/build-appimage.sh ${{ matrix.arch }}

      - name: Smoke-test the AppImage
        run: |
          ./deck-${{ matrix.arch }}.AppImage --appimage-extract-and-run --version
          ./deck-${{ matrix.arch }}.AppImage --appimage-extract-and-run doctor \
            | tee doctor.txt
          # REQUIRED core tools (incl. V4-capable rtl_sdr) — fail if missing.
          for t in rtl_sdr multimon-ng dsd-neo sox minimodem; do
            grep -q "  $t " doctor.txt || { echo "MISSING required tool: $t"; exit 1; }
          done
          # OPTIONAL extras — warn only; a build failure here must not block V4.
          for t in rtl_ais dump1090; do
            grep -q "  $t " doctor.txt || echo "NOTE: optional tool not bundled: $t"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: deck-${{ matrix.arch }}.AppImage
          path: deck-${{ matrix.arch }}.AppImage

      - name: Update rolling "continuous" prerelease (main)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES="Rolling build of main. Self-contained: bundles rtl_sdr, multimon-ng, sox, minimodem, hackrf, airspyhf, dsd-neo, rtl_ais, dump1090. Download the AppImage for your arch, \`chmod +x\`, run.

          Host still needs: GL/GLES + libxkbcommon + pulse/pipewire (Pi OS desktop has all three), and RTL-SDR USB permissions — see packaging/70-deck-sdr.rules. \`deck doctor\` checks both."
          gh release view continuous >/dev/null 2>&1 || \
            gh release create continuous --prerelease \
              --title "continuous (latest main)" --notes "$NOTES" || true
          gh release edit continuous --notes "$NOTES" || true
          gh release upload continuous "deck-${{ matrix.arch }}.AppImage" --clobber

      - name: Attach to tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes || true
          gh release upload "${GITHUB_REF_NAME}" "deck-${{ matrix.arch }}.AppImage" --clobber
