name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      # builds with cross for the aarch64 target, uploads tar.gz to the release
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: deck
          target: ${{ matrix.target }}
          tar: gz
          token: ${{ secrets.GITHUB_TOKEN }}
