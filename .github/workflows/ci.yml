name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test
      - name: UI smoke test (headless screenshots)
        run: |
          cargo build
          ./target/debug/deck shot --out /tmp/shots
          test -s /tmp/shots/menu.png
      - name: doctor runs
        run: ./target/debug/deck doctor
